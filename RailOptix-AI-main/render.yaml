services:
  - type: web
    name: railoptix-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: mysql://db_user:db_password@hostname:3306/railoptix_db
      - key: PYTHON_VERSION
        value: 3.11.0
